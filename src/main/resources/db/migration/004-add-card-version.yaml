databaseChangeLog:
  - changeSet:
      id: 004-add-card-version
      author: Maxim Stepanov
      comment: "Optimistic locking для предотвращения гонок при переводах"
      changes:
        - addColumn:
            tableName: cards
            columns:
              - column:
                  name: version
                  type: bigint
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
